<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kite Cafe — Sunday Preorder</title>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9f9f7; color: #1a1a1a; min-height: 100vh; }
    .page { max-width: 540px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }
    .cafe-header { text-align: center; margin-bottom: 2.5rem; }
    .cafe-name { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
    .cafe-sub { font-size: 14px; color: #777; margin-top: 5px; }
    .section { margin-bottom: 2rem; }
    .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #999; margin-bottom: 10px; }

    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .menu-item { background: #fff; border: 1px solid #e8e8e4; border-radius: 12px; padding: 12px 14px; cursor: pointer; user-select: none; transition: border-color 0.15s; }
    .menu-item:hover { border-color: #bbb; }
    .menu-item.selected { border: 2px solid #1D9E75; background: #f0fbf6; }
    .item-name { font-size: 14px; font-weight: 500; line-height: 1.35; }
    .item-desc { font-size: 12px; color: #888; margin-top: 3px; line-height: 1.4; }
    .item-price { font-size: 13px; color: #0F6E56; margin-top: 6px; font-weight: 600; }
    .item-qty { display: none; align-items: center; gap: 10px; margin-top: 8px; }
    .menu-item.selected .item-qty { display: flex; }
    .qty-btn { width: 26px; height: 26px; border-radius: 50%; border: 1px solid #1D9E75; background: transparent; color: #1D9E75; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
    .qty-num { font-size: 14px; font-weight: 500; min-width: 16px; text-align: center; }

    .slots-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .slot { background: #fff; border: 1px solid #e8e8e4; border-radius: 10px; padding: 10px 8px; cursor: pointer; text-align: center; transition: border-color 0.15s; }
    .slot:hover { border-color: #bbb; }
    .slot.selected { border: 2px solid #1D9E75; background: #f0fbf6; }
    .slot-time { font-size: 14px; font-weight: 500; }
    .slot.selected .slot-time { color: #0F6E56; }

    .order-summary { background: #f5f5f3; border-radius: 12px; padding: 14px 16px; min-height: 54px; }
    .summary-row { display: flex; justify-content: space-between; font-size: 13px; color: #666; padding: 2px 0; }
    .summary-row.total { font-size: 14px; font-weight: 600; color: #1a1a1a; border-top: 1px solid #e0e0dc; padding-top: 8px; margin-top: 6px; }
    .summary-empty { font-size: 13px; color: #aaa; }

    .payment-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .pay-option { background: #fff; border: 1px solid #e8e8e4; border-radius: 12px; padding: 14px 10px; text-align: center; cursor: pointer; user-select: none; transition: border-color 0.15s; }
    .pay-option:hover { border-color: #bbb; }
    .pay-option.selected { border: 2px solid #1D9E75; background: #f0fbf6; }
    .pay-logo { font-size: 15px; font-weight: 700; }
    .pay-handle { font-size: 11px; color: #0F6E56; margin-top: 4px; display: none; }
    .pay-option.selected .pay-handle { display: block; }

    input, textarea { width: 100%; font-family: inherit; font-size: 14px; background: #fff; border: 1px solid #e8e8e4; border-radius: 8px; padding: 10px 12px; color: #1a1a1a; outline: none; transition: border-color 0.15s; }
    input:focus, textarea:focus { border-color: #1D9E75; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .field-full { margin-bottom: 10px; }
    .field-hint { font-size: 11px; color: #aaa; margin-top: 4px; padding-left: 2px; }

    .submit-btn { width: 100%; padding: 14px; background: #1D9E75; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s; }
    .submit-btn:hover:not(:disabled) { background: #0F6E56; }
    .submit-btn:disabled { background: #e0e0dc; color: #aaa; cursor: not-allowed; }
    .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { font-size: 13px; color: #c0392b; margin-top: 10px; text-align: center; display: none; }

    .success-card { background: #f0fbf6; border: 1px solid #5DCAA5; border-radius: 16px; padding: 2.5rem 1.75rem; }
    .success-check { width: 48px; height: 48px; background: #1D9E75; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .success-check svg { width: 24px; height: 24px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .success-title { font-size: 20px; font-weight: 600; color: #085041; margin-bottom: 6px; text-align: center; }
    .success-sub { font-size: 14px; color: #0F6E56; line-height: 1.7; text-align: center; margin-bottom: 1.25rem; }
    .pay-instructions { background: #fff; border-radius: 10px; padding: 14px 16px; }
    .pay-instructions-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: #0F6E56; margin-bottom: 10px; }
    .pay-row { display: flex; justify-content: space-between; align-items: baseline; font-size: 13px; color: #333; padding: 4px 0; border-bottom: 1px solid #f0f0ee; }
    .pay-row:last-child { border-bottom: none; }
    .pay-row-label { color: #888; }
    .pay-row-val { font-weight: 500; color: #085041; text-align: right; }
    .pay-row.big .pay-row-val { font-size: 15px; font-weight: 700; }
  </style>
</head>
<body>
<div class="page">

  <div class="cafe-header">
    <div class="cafe-name">Kite Cafe</div>
    <div class="cafe-sub">Sunday pickup orders &middot; 9:00 AM &ndash; 2:00 PM</div>
  </div>

  <div id="order-form">

    <div class="section">
      <div class="section-label">Menu</div>
      <div class="menu-grid" id="menu-grid"></div>
    </div>

    <div class="section">
      <div class="section-label">Pickup time</div>
      <div class="slots-grid" id="slots-grid"></div>
    </div>

    <div class="section">
      <div class="section-label">Order summary</div>
      <div class="order-summary" id="order-summary">
        <div class="summary-empty">No items selected yet</div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Payment method</div>
      <div class="payment-grid">
        <div class="pay-option" onclick="selectPay('venmo')" id="pay-venmo">
          <div class="pay-logo" style="color:#008CFF;">Venmo</div>
          <div class="pay-handle">@drew_122400</div>
        </div>
        <div class="pay-option" onclick="selectPay('zelle')" id="pay-zelle">
          <div class="pay-logo" style="color:#6D1ED4;">Zelle</div>
          <div class="pay-handle">(626) 695-1767</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Your info</div>
      <div class="field-row">
        <input type="text" placeholder="First name" id="fname" />
        <input type="text" placeholder="Last name" id="lname" />
      </div>
      <div class="field-full">
        <input type="email" placeholder="Email address" id="email" />
      </div>
      <div class="field-full">
        <input type="tel" placeholder="Phone number" id="phone" />
        <div class="field-hint">We'll text you to confirm once payment is received</div>
      </div>
      <div class="field-full">
        <textarea placeholder="Any notes or special requests..." id="notes" rows="2" style="resize:none;"></textarea>
      </div>
    </div>

    <button class="submit-btn" id="submit-btn" disabled>
      <span id="btn-label">Place order</span>
      <div class="spinner" id="spinner"></div>
    </button>
    <div class="error-msg" id="error-msg"></div>

  </div>

  <div id="success-view" style="display:none;">
    <div class="success-card">
      <div class="success-check">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="success-title">Order received!</div>
      <div class="success-sub" id="success-msg"></div>
      <div class="pay-instructions">
        <div class="pay-instructions-label">Send payment to confirm your spot</div>
        <div id="pay-rows"></div>
      </div>
      <button class="another-btn" onclick="resetForm()">Place another order</button>
    </div>
  </div>

</div>
<script>
const WEB3FORMS_KEY = "c0596343-7399-4509-be6c-ce6b925cf565";

const menuItems = [
  {
    id: 1,
    name: "Salted Egg Cream Coffee",
    desc: "Rich salted egg yolk cream over Vietnamese coffee",
    price: 7
  },
  {
    id: 2,
    name: "Sweet Rice Cream Coffee",
    desc: "Sticky rice-infused cream layered over coffee",
    price: 7
  },
  {
    id: 3,
    name: "Traditional Vietnamese Coffee",
    desc: "Classic ca phe sua da — strong, sweet, iced",
    price: 7
  },
  {
    id: 4,
    name: "B.A.C.E. Sandwich",
    desc: "Bacon, avocado, cheese & egg on toasted bread",
    price: 15
  },
];

const payInfo = {
  venmo: { label: "Venmo", handle: "@drew_122400" },
  zelle: { label: "Zelle", handle: "(626) 695-1767" },
};

function generateSlots() {
  const s = [];
  for (let h = 9; h < 14; h++) {
    s.push(`${h.toString().padStart(2,"0")}:00`);
    s.push(`${h.toString().padStart(2,"0")}:30`);
  }
  s.push("14:00");
  return s;
}

function fmt(s) {
  const [hStr, mStr] = s.split(":");
  let h = parseInt(hStr, 10);
  const ap = h >= 12 ? "PM" : "AM";
  if (h > 12) h -= 12;
  return `${h}:${mStr} ${ap}`;
}

let cart = {}, selectedSlot = null, selectedPay = null;

function renderMenu() {
  document.getElementById("menu-grid").innerHTML = menuItems.map(item => `
    <div class="menu-item ${cart[item.id] ? "selected" : ""}" onclick="toggleItem(${item.id})">
      <div class="item-name">${item.name}</div>
      <div class="item-desc">${item.desc}</div>
      <div class="item-price">$${item.price}</div>
      <div class="item-qty">
        <button class="qty-btn" onclick="changeQty(event,${item.id},-1)">−</button>
        <span class="qty-num">${cart[item.id] || 1}</span>
        <button class="qty-btn" onclick="changeQty(event,${item.id},1)">+</button>
      </div>
    </div>`).join("");
}

function toggleItem(id) {
  cart[id] ? delete cart[id] : cart[id] = 1;
  renderMenu(); updateSummary(); updateSubmit();
}

function changeQty(e, id, delta) {
  e.stopPropagation();
  const q = (cart[id] || 1) + delta;
  q < 1 ? delete cart[id] : cart[id] = q;
  renderMenu(); updateSummary();
}

function renderSlots() {
  document.getElementById("slots-grid").innerHTML = generateSlots().map(s => `
    <div class="slot ${selectedSlot === s ? "selected" : ""}" onclick="selectSlot('${s}')">
      <div class="slot-time">${fmt(s)}</div>
    </div>`).join("");
}

function selectSlot(s) { selectedSlot = s; renderSlots(); updateSubmit(); }

function selectPay(key) {
  selectedPay = key;
  ["venmo","zelle"].forEach(k => document.getElementById("pay-"+k).classList.toggle("selected", k === key));
  updateSubmit();
}

function updateSummary() {
  const el = document.getElementById("order-summary");
  const ids = Object.keys(cart);
  if (!ids.length) { el.innerHTML = '<div class="summary-empty">No items selected yet</div>'; return; }
  let total = 0;
  let rows = ids.map(id => {
    const item = menuItems.find(m => m.id == id);
    const sub = item.price * cart[id]; total += sub;
    return `<div class="summary-row"><span>${item.name} &times; ${cart[id]}</span><span>$${sub}</span></div>`;
  }).join("");
  rows += `<div class="summary-row total"><span>Total</span><span>$${total}</span></div>`;
  el.innerHTML = rows;
}

function getTotal() {
  return Object.keys(cart).reduce((s, id) => s + menuItems.find(m => m.id == id).price * cart[id], 0);
}

function updateSubmit() {
  document.getElementById("submit-btn").disabled = !(Object.keys(cart).length && selectedSlot && selectedPay);
}

document.getElementById("submit-btn").addEventListener("click", async () => {
  const fname = document.getElementById("fname").value.trim();
  const lname = document.getElementById("lname").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const notes = document.getElementById("notes").value.trim();
  const errEl = document.getElementById("error-msg");

  if (!fname || !email || !phone) {
    errEl.textContent = "Please enter your name, email, and phone number.";
    errEl.style.display = "block"; return;
  }
  errEl.style.display = "none";

  const itemSummary = Object.keys(cart).map(id => {
    const item = menuItems.find(m => m.id == id);
    return `${item.name} x${cart[id]} ($${item.price * cart[id]})`;
  }).join(", ");

  const total = getTotal();
  const pay = payInfo[selectedPay];

  document.getElementById("btn-label").style.display = "none";
  document.getElementById("spinner").style.display = "block";
  document.getElementById("submit-btn").disabled = true;

  try {
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      first_name: fname,
      last_name: lname,
      email: email,
      phone: phone,
      pickup_time: fmt(selectedSlot),
      payment_method: pay.label,
      items: itemSummary,
      total: `$${total}`,
      notes: notes || "None",
      
    }, EMAILJS_PUBLIC_KEY);

    document.getElementById("order-form").style.display = "none";
    document.getElementById("success-view").style.display = "block";

    document.getElementById("success-msg").textContent =
      `Thanks ${fname}! We'll text you at ${phone} to confirm once we see your payment.`;

    document.getElementById("pay-rows").innerHTML = `
      <div class="pay-row"><span class="pay-row-label">Via</span><span class="pay-row-val">${pay.label}</span></div>
      <div class="pay-row"><span class="pay-row-label">To</span><span class="pay-row-val">${pay.handle}</span></div>
      <div class="pay-row"><span class="pay-row-label">Memo</span><span class="pay-row-val">${fname} ${fmt(selectedSlot)}</span></div>
      <div class="pay-row big"><span class="pay-row-label">Amount</span><span class="pay-row-val">$${total}</span></div>
    `;
  } catch {
    document.getElementById("btn-label").style.display = "block";
    document.getElementById("spinner").style.display = "none";
    document.getElementById("submit-btn").disabled = false;
    errEl.textContent = "Something went wrong. Please try again.";
    errEl.style.display = "block";
  }
});

renderMenu();
renderSlots();
</script>
</body>
</html>
